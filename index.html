<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Peas</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="phone">

  <header class="topbar">
    <i class="fas fa-bars"></i>
    <h1>World Peas</h1>
    <i class="fas fa-basket-shopping"></i>
  </header>

  <section class="heading">
    <h2>All Aisles/<span>Produce</span></h2>

    <div class="search-row">
      <div class="filters">
        <button class="active">Default</button>
        <button>A-Z</button>
        <button>$ -> $$</button>
      </div>
      <i class="fas fa-search"></i>
    </div>
  </section>

  <section class="products">

    <div class="card">
      <img src="https://static.vecteezy.com/system/resources/thumbnails/047/433/957/small/fresh-garlic-rhizome-and-sliced-with-leaves-isolated-png.png" alt="Garlic clove">
      <div class="info">
        <h3>Garlic clove</h3>
        <p class="price">$0.89 each</p>
        <span>Kunisaki Farms →</span>
      </div>

      <div class="actions">
        <i class="far fa-heart"></i>
        <button>+</button>
      </div>
    </div>

    <div class="card">
      <img src="https://static.vecteezy.com/system/resources/previews/057/240/612/non_2x/elegant-green-pea-pod-with-opened-view-vector.jpg" alt="Sugar snap pea">
      <div class="info">
        <h3>Sugar snap pea</h3>
        <p class="price">$2.29/lb</p>
        <span>Helmbolt Orchards →</span>
      </div>

      <div class="actions">
        <i class="far fa-heart"></i>
        <button>+</button>
      </div>
    </div>

    <div class="card">
      <img src="https://static.vecteezy.com/system/resources/thumbnails/055/848/163/small/a-fresh-ginger-root-with-a-knobby-tan-surface-and-a-textured-appearance-png.png" alt="Ginger">
      <div class="info">
        <h3>Ginger</h3>
        <p class="price">$4.20/lb</p>
        <span>Bui Farms →</span>
      </div>

      <div class="actions">
        <i class="far fa-heart"></i>
        <button>+</button>
      </div>
    </div>

    <div class="card">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTws8iEhY9Pg7RIZpxWOn_AhiPCrp55xzKbVbE14M1YCg&s=10" alt="Sweet onion">
      <div class="info">
        <h3>Sweet onion</h3>
        <p class="price">$0.39/lb</p>
        <span>Organic Farms →</span>
      </div>

      <div class="actions">
        <i class="far fa-heart"></i>
        <button>+</button>
      </div>
    </div>

  </section>

</div>

</body>
</html>
